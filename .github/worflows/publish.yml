name: FelixRuntime Auto-Render

on:
  push:
    branches: [ main ]
    
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Site
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          pip install pandas numpy scikit-learn seaborn matplotlib reticulate

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0' 

      - name: Install R Dependencies via renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1
          working-directory: projects/iris-optimization 

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}